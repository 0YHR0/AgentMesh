x-agentmesh-environment: &agentmesh-environment
  AGENTMESH_ENVIRONMENT: development
  AGENTMESH_DATABASE_URL: postgresql+psycopg://agentmesh:agentmesh@postgres:5432/agentmesh
  AGENTMESH_CHECKPOINT_DATABASE_URL: postgresql://agentmesh:agentmesh@postgres:5432/agentmesh
  AGENTMESH_REDIS_URL: redis://redis:6379/0
  AGENTMESH_TENANT_ID: default
  AGENTMESH_AGENT_ID: demo-agent
  AGENTMESH_REVIEWER_AGENT_ID: demo-reviewer
  AGENTMESH_REVIEW_MAX_REVISIONS: ${AGENTMESH_REVIEW_MAX_REVISIONS:-3}
  AGENTMESH_SUPERVISOR_AGENT_ID: demo-supervisor
  AGENTMESH_COORDINATED_MAX_CONCURRENCY: ${AGENTMESH_COORDINATED_MAX_CONCURRENCY:-4}
  AGENTMESH_LANGFUSE_ENABLED: ${AGENTMESH_LANGFUSE_ENABLED:-false}
  AGENTMESH_LANGFUSE_PUBLIC_KEY: ${AGENTMESH_LANGFUSE_PUBLIC_KEY:-${LANGFUSE_PUBLIC_KEY:-}}
  AGENTMESH_LANGFUSE_SECRET_KEY: ${AGENTMESH_LANGFUSE_SECRET_KEY:-${LANGFUSE_SECRET_KEY:-}}
  AGENTMESH_LANGFUSE_BASE_URL: ${AGENTMESH_LANGFUSE_BASE_URL:-${LANGFUSE_BASE_URL:-http://host.docker.internal:3000}}
  AGENTMESH_LANGFUSE_TIMEOUT_SECONDS: ${AGENTMESH_LANGFUSE_TIMEOUT_SECONDS:-5}
  AGENTMESH_FEATURE_PROFILE: ${AGENTMESH_FEATURE_PROFILE:-minimal}
  AGENTMESH_FEATURE_GATES: ${AGENTMESH_FEATURE_GATES:-}
  AGENTMESH_IDENTITY_PRINCIPALS_JSON: ${AGENTMESH_IDENTITY_PRINCIPALS_JSON:-[]}
  AGENTMESH_POLICY_RULES_JSON: ${AGENTMESH_POLICY_RULES_JSON:-}
  AGENTMESH_POLICY_ACTION_TTL_SECONDS: ${AGENTMESH_POLICY_ACTION_TTL_SECONDS:-3600}
  AGENTMESH_ARTIFACT_OWNER_ID: ${AGENTMESH_ARTIFACT_OWNER_ID:-local-user}
  AGENTMESH_ARTIFACT_MAX_INLINE_BYTES: ${AGENTMESH_ARTIFACT_MAX_INLINE_BYTES:-65536}
  AGENTMESH_RETENTION_INTERVAL_SECONDS: ${AGENTMESH_RETENTION_INTERVAL_SECONDS:-300}
  AGENTMESH_RETENTION_BATCH_SIZE: ${AGENTMESH_RETENTION_BATCH_SIZE:-1000}
  AGENTMESH_OUTBOX_RETENTION_SECONDS: ${AGENTMESH_OUTBOX_RETENTION_SECONDS:-604800}
  AGENTMESH_INBOX_RETENTION_SECONDS: ${AGENTMESH_INBOX_RETENTION_SECONDS:-2592000}
  AGENTMESH_REDIS_STREAM_RETENTION_SECONDS: ${AGENTMESH_REDIS_STREAM_RETENTION_SECONDS:-604800}
  AGENTMESH_REDIS_STREAM_MAX_ENTRIES: ${AGENTMESH_REDIS_STREAM_MAX_ENTRIES:-100000}
  AGENTMESH_DEAD_LETTER_STREAM_RETENTION_SECONDS: ${AGENTMESH_DEAD_LETTER_STREAM_RETENTION_SECONDS:-2592000}
  AGENTMESH_DEAD_LETTER_STREAM_MAX_ENTRIES: ${AGENTMESH_DEAD_LETTER_STREAM_MAX_ENTRIES:-50000}
  AGENTMESH_RELAY_METRICS_ENABLED: ${AGENTMESH_RELAY_METRICS_ENABLED:-true}
  AGENTMESH_RELAY_METRICS_HOST: ${AGENTMESH_RELAY_METRICS_HOST:-0.0.0.0}
  AGENTMESH_RELAY_METRICS_PORT: ${AGENTMESH_RELAY_METRICS_PORT:-9464}
  AGENTMESH_MCP_WORKSPACE_ROOT: ${AGENTMESH_MCP_WORKSPACE_ROOT:-/app}
  AGENTMESH_MCP_WORKSPACE_TIMEOUT_SECONDS: ${AGENTMESH_MCP_WORKSPACE_TIMEOUT_SECONDS:-30}
  AGENTMESH_MCP_WORKSPACE_MAX_BYTES: ${AGENTMESH_MCP_WORKSPACE_MAX_BYTES:-65536}
  AGENTMESH_MCP_MAX_RESULT_BYTES: ${AGENTMESH_MCP_MAX_RESULT_BYTES:-262144}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agentmesh
      POSTGRES_USER: agentmesh
      POSTGRES_PASSWORD: agentmesh
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmesh -d agentmesh"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - agentmesh-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment: *agentmesh-environment
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build: .
    command: ["agentmesh-seed"]
    environment: *agentmesh-environment
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build: .
    command: [
      "uvicorn", "agentmesh.api.app:app", "--host", "0.0.0.0", "--port", "8000"
    ]
    environment: *agentmesh-environment
    ports:
      - "8000:8000"
    depends_on:
      seed:
        condition: service_completed_successfully

  relay:
    build: .
    command: ["agentmesh-relay"]
    environment:
      <<: *agentmesh-environment
      AGENTMESH_RELAY_ID: relay-1
    ports:
      - "127.0.0.1:${AGENTMESH_RELAY_METRICS_PORT:-9464}:${AGENTMESH_RELAY_METRICS_PORT:-9464}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["agentmesh-worker"]
    environment:
      <<: *agentmesh-environment
      AGENTMESH_WORKER_ID: worker-1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  agentmesh-postgres:
