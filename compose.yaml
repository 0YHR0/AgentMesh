x-agentmesh-environment: &agentmesh-environment
  AGENTMESH_ENVIRONMENT: development
  AGENTMESH_DATABASE_URL: postgresql+psycopg://agentmesh:agentmesh@postgres:5432/agentmesh
  AGENTMESH_CHECKPOINT_DATABASE_URL: postgresql://agentmesh:agentmesh@postgres:5432/agentmesh
  AGENTMESH_REDIS_URL: redis://redis:6379/0
  AGENTMESH_TENANT_ID: default
  AGENTMESH_AGENT_ID: demo-agent
  AGENTMESH_LANGFUSE_ENABLED: "false"
  AGENTMESH_FEATURE_PROFILE: ${AGENTMESH_FEATURE_PROFILE:-minimal}
  AGENTMESH_FEATURE_GATES: ${AGENTMESH_FEATURE_GATES:-}
  AGENTMESH_ARTIFACT_OWNER_ID: ${AGENTMESH_ARTIFACT_OWNER_ID:-local-user}
  AGENTMESH_ARTIFACT_MAX_INLINE_BYTES: ${AGENTMESH_ARTIFACT_MAX_INLINE_BYTES:-65536}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agentmesh
      POSTGRES_USER: agentmesh
      POSTGRES_PASSWORD: agentmesh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmesh -d agentmesh"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - agentmesh-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment: *agentmesh-environment
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build: .
    command: ["agentmesh-seed"]
    environment: *agentmesh-environment
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build: .
    command: [
      "uvicorn", "agentmesh.api.app:app", "--host", "0.0.0.0", "--port", "8000"
    ]
    environment: *agentmesh-environment
    ports:
      - "8000:8000"
    depends_on:
      seed:
        condition: service_completed_successfully

  relay:
    build: .
    command: ["agentmesh-relay"]
    environment:
      <<: *agentmesh-environment
      AGENTMESH_RELAY_ID: relay-1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["agentmesh-worker"]
    environment:
      <<: *agentmesh-environment
      AGENTMESH_WORKER_ID: worker-1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  agentmesh-postgres:
