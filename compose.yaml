services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agentmesh
      POSTGRES_USER: agentmesh
      POSTGRES_PASSWORD: agentmesh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmesh -d agentmesh"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - agentmesh-postgres:/var/lib/postgresql/data

  api:
    build: .
    environment:
      AGENTMESH_ENVIRONMENT: development
      AGENTMESH_DATABASE_URL: postgresql+psycopg://agentmesh:agentmesh@postgres:5432/agentmesh
      AGENTMESH_CHECKPOINT_DATABASE_URL: postgresql://agentmesh:agentmesh@postgres:5432/agentmesh
      AGENTMESH_AGENT_ID: demo-agent
      AGENTMESH_LANGFUSE_ENABLED: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  agentmesh-postgres:
