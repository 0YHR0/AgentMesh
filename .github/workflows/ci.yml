name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: agentmesh
          POSTGRES_USER: agentmesh
          POSTGRES_PASSWORD: agentmesh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentmesh -d agentmesh"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    env:
      AGENTMESH_DATABASE_URL: postgresql+psycopg://agentmesh:agentmesh@127.0.0.1:5432/agentmesh
      AGENTMESH_CHECKPOINT_DATABASE_URL: postgresql://agentmesh:agentmesh@127.0.0.1:5432/agentmesh
      AGENTMESH_REDIS_URL: redis://127.0.0.1:6379/0

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev,observability]"
      - name: Lint
        run: ruff check .
      - name: Run unit tests
        run: pytest -m "not postgres"
      - name: Apply business migrations
        run: alembic upgrade head
      - name: Run PostgreSQL and Redis integration test
        env:
          AGENTMESH_RUN_POSTGRES_TESTS: "1"
        run: pytest -m postgres
