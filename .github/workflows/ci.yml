name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev,observability]"
      - name: Lint
        run: ruff check .
      - name: Compile Python sources
        run: python -m compileall -q src tests

  unit-coverage:
    name: unit-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev,observability]"
      - name: Run fast tests with coverage gate
        run: >-
          pytest -m "not postgres"
          --cov=agentmesh
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=80
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage-${{ github.run_id }}
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 7

  postgres-integration:
    name: postgres-integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: agentmesh
          POSTGRES_USER: agentmesh
          POSTGRES_PASSWORD: agentmesh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentmesh -d agentmesh"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      AGENTMESH_DATABASE_URL: postgresql+psycopg://agentmesh:agentmesh@127.0.0.1:5432/agentmesh
      AGENTMESH_CHECKPOINT_DATABASE_URL: postgresql://agentmesh:agentmesh@127.0.0.1:5432/agentmesh
      AGENTMESH_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev,observability]"
      - name: Apply and validate migrations
        run: |
          alembic upgrade head
          alembic check
          alembic downgrade -1
          alembic upgrade head
      - name: Run PostgreSQL and Redis integration tests
        env:
          AGENTMESH_RUN_POSTGRES_TESTS: "1"
        run: pytest -m postgres

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Reject newly introduced high-severity dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  compose-e2e:
    name: compose-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AGENTMESH_FEATURE_PROFILE: full
      COMPOSE_PROJECT_NAME: agentmesh-ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7
      - name: Run the real Compose task flow
        run: scripts/ci/compose-e2e.sh
      - name: Capture service logs on failure
        if: failure()
        run: docker compose logs --no-color > compose-e2e.log
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: compose-e2e-logs-${{ github.run_id }}
          path: compose-e2e.log
          retention-days: 7
      - name: Stop Compose services
        if: always()
        run: docker compose down -v --remove-orphans
